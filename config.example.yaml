models:
  fast:
    name: "gpt-4.1-mini"
    provider: "openai"
  boost:
    name: "o4-mini"
    provider: "openai"
    reasoning_effort: "medium"
  haiku:
    name: "anthropic/claude-3-haiku"
    provider: "openrouter"
  haiku-search:
    name: "anthropic/claude-3-haiku"
    provider: "openrouter"
    openrouter:
      server_tools:
        - type: "openrouter:web_search"

# Prompts support @directives:
#   @./path/to/file or @/abs/path  -- inline file contents
#   @parent                        -- embed the parent-level prompt
# Note: quote Discord snowflake IDs (they exceed JS safe integer range)
guilds:
  "111111111111111111":
    # prompt: "@./prompts/guild.txt"
    channels:
      "123456789012345678":
        # prompt: "@parent\nThis channel is for cat topics only."
        models:
          - model: boost
            trigger: "^!ai-boost"
          - model: fast
            trigger: "AI|ＡＩ"
      "987654321098765432":
        models:
          - model: haiku
            trigger: "AI|ＡＩ"
